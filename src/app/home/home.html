<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg">
        <div class="card-header text-center text-white">
          <h4 class="mb-0">QUIZZzzz</h4>
        </div>

        <div class="card-body p-4">
          <form>
            <div class="mb-4">
              <label class="form-label">Enter your name</label>
              <input [(ngModel)]="quizService.userName" type="text" class="form-control" name="user_name" placeholder="Name please...">
            </div>

            <div class="mb-4">
              <label class="form-label">Enter age</label>
              <input type="text" class="form-control" name="user_age" placeholder="Age please...">
            </div>

            <div class="d-grid">
              <button type="button" class="btn btn-primary btn-lg" [routerLink]="['/main']">Let's Gooo!!!</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div> 
</div>
