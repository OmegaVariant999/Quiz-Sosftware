<div class="container mt-5">
    <p class="fs-4 fw-semibold text-center text-white">
        Hello, {{user_name}} 👋
    </p>
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow p-3">
        <h5>Question {{ currentIndex + 1 }}</h5>

        <div class="badge rounded-pill" 
          [ngClass]="timeLeft <= 5 ? 'bg-danger' : 'bg-primary'" 
          style="font-size: 1.1rem; padding: 8px 15px;">
          {{ timeLeft }}s ⏱️
        </div>

        <p>{{ quiz[currentIndex].question }}</p>

        <div class="list-group">
          <label *ngFor="let opt of quiz[currentIndex].options" class="list-group-item list-group-item-action d-flex align-items-center" 
              [class.correct-highlight]="isAnswered && opt === quiz[currentIndex].answer"
              [class.wrong-highlight]="isAnswered && selectedAnswer === opt && opt !== quiz[currentIndex].answer"
              [class.disabled]="isAnswered"> 
            <input 
              class="form-check-input me-2" 
              type="radio" 
              name="quizGroup" 
              [value]="opt" 
              [disabled]="isAnswered"
              [(ngModel)]="selectedAnswer">
            {{ opt }}
          </label>
        </div>

        <div *ngIf="isAnswered" class="mt-3 fw-bold text-center">
          <p *ngIf="selectedAnswer === quiz[currentIndex].answer" class="text-success">
            CORRECT! ✨
          </p>
          <p *ngIf="selectedAnswer !== quiz[currentIndex].answer" class="text-danger">
            WRONG ANSWER! ❌
          </p>
        </div>

        <button class="btn btn-success mt-3 w-100" (click)="nextQuestion()">
          {{ !isAnswered ? 'Submit Answer' : (currentIndex === quiz.length - 1 ? 'Finish' : 'Next Question') }}
        </button>
      </div>

    <div class="mt-4">
    <button class="btn btn-outline-danger" [routerLink]="['/home']">
      Take me to Home
    </button>
  </div>

    </div>
  </div>

</div>
